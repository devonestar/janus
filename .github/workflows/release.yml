name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  # id-token: write is required for npm Trusted Publisher (OIDC) and --provenance.
  # Do not remove: auth is OIDC, not NPM_TOKEN. Removing breaks publishing.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package.json version matches git tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "workflow_dispatch on main — skipping tag match check"
          elif [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Test (mock backend + doctor regression guards)
        run: npm test

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit before tagging."
            git diff --stat dist/
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
